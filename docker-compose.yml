services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    env_file:
      - .env.postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  kontracts-api:
    image: kontracts/kontracts-api:latest
    container_name: kontracts-api
    restart: unless-stopped
    env_file:
      - .env.kontracts-api
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8001"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8001"

  orion:
    image: ghcr.io/kontracts-integrations/kontracts-integrations-backend:latest
    container_name: orion
    restart: unless-stopped
    env_file:
      - .env.orion
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "7002"
    command: >
      sh -c "alembic upgrade heads &&
             uvicorn app.main:app --host 0.0.0.0 --port 7002"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    env_file:
      - .env.pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./pgadmin/config_local.py:/pgadmin4/config_local.py:ro
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro

  tri-demo:
    image: kirankb/salesdemo_10.6.1_tririga:latest
    container_name: tri-demo
    restart: unless-stopped
    expose:
      - "8001"
    command: ./runtririga.sh

  webhook-ui:
    build: ./webhook
    container_name: webhook-ui
    restart: unless-stopped
    env_file:
      - .env.webhook-ui
    environment:
      - REPO_DIR=/repo
    expose:
      - "9000"
    volumes:
      - field-flow-ui:/repo

  webhook-api:
    build: ./webhook
    container_name: webhook-api
    restart: unless-stopped
    env_file:
      - .env.webhook-api
    environment:
      - REPO_DIR=/repo
    expose:
      - "9000"
    volumes:
      - field-flow-api:/repo

  timesheet:
    image: ghcr.io/kalyanchakravarthyv/timesheet.vadlakonda.in:latest
    container_name: timesheet
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env.timesheet
    expose:
      - "8000"
    depends_on:
      - timesheet-redis

  timesheet-celery:
    image: ghcr.io/kalyanchakravarthyv/timesheet.vadlakonda.in:latest
    container_name: timesheet-celery
    restart: unless-stopped
    command: celery -A config.celery worker --loglevel=info
    env_file:
      - .env.timesheet
    depends_on:
      - timesheet-redis

  timesheet-beat:
    image: ghcr.io/kalyanchakravarthyv/timesheet.vadlakonda.in:latest
    container_name: timesheet-beat
    restart: unless-stopped
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env.timesheet
    depends_on:
      - timesheet-redis

  timesheet-redis:
    image: redis:7-alpine
    container_name: timesheet-redis
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - kontracts-api
      - orion
      - pgadmin
      - tri-demo
      - webhook-ui
      - webhook-api
      - timesheet
      - certbot
    command: >
      /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    restart: unless-stopped
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 2592000 & wait $${!};
        done"

volumes:
  field-flow-ui:
  field-flow-api:
  postgres-data:
  pgadmin-data:
