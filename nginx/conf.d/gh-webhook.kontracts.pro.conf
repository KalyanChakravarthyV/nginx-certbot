upstream webhook-ui {
    server webhook-ui:9000;
    keepalive 4;
}

upstream webhook-api {
    server webhook-api:9000;
    keepalive 4;
}

server {
    listen 80;
    server_name gh-webhook.kontracts.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name gh-webhook.kontracts.pro;

    ssl_certificate     /etc/letsencrypt/live/gh-webhook.kontracts.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gh-webhook.kontracts.pro/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 1m;

    # field-flow-ui  →  /ui/webhook
    location /ui/ {
        proxy_pass         http://webhook-ui/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
    }

    # field-flow-api  →  /api/webhook
    location /api/ {
        proxy_pass         http://webhook-api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
    }

    location / {
        return 404;
    }
}
