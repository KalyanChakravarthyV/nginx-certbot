map $http_origin $cors_origin {
    default                          "";
    "https://auriga.kontracts.pro"   $http_origin;
    "http://localhost:3000"          $http_origin;
}

server {
    listen 80;
    server_name orion.kontracts.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name orion.kontracts.pro;

    ssl_certificate     /etc/letsencrypt/live/orion.kontracts.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orion.kontracts.pro/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    set $orion_upstream http://orion:7002;

    location / {
        proxy_pass         $orion_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;

        proxy_hide_header  Access-Control-Allow-Origin;
        proxy_hide_header  Access-Control-Allow-Credentials;
        add_header         Access-Control-Allow-Origin      $cors_origin always;
        add_header         Access-Control-Allow-Credentials "true" always;
        add_header         Vary                             "Origin" always;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
    }
}
