upstream kontracts_api {
    server kontracts-api:8001;
    keepalive 32;
}

# HTTP — ACME challenge passthrough + redirect to HTTPS
server {
    listen 80;
    server_name api-dev.kontracts.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — reverse proxy to kontracts-api
server {
    listen 443 ssl;
    http2 on;
    server_name api-dev.kontracts.pro;

    ssl_certificate     /etc/letsencrypt/live/api-dev.kontracts.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-dev.kontracts.pro/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # API-specific: allow reasonable payload size
    client_max_body_size 10m;

    location / {
        proxy_pass         http://kontracts_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }
}
